<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Top face -->
  <polygon points="64,12 116,40 64,68 12,40" fill="#9B8FED"/>
  <!-- Left face -->
  <polygon points="12,40 64,68 64,120 12,92" fill="#6356C7"/>
  <!-- Right face -->
  <polygon points="64,68 116,40 116,92 64,120" fill="#7B6FDB"/>
  <!-- Top face edge highlight -->
  <polygon points="64,12 116,40 64,68 12,40" fill="none" stroke="#B0A4F7" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Inner edge lines for depth -->
  <line x1="64" y1="68" x2="64" y2="120" stroke="#4A3EA8" stroke-width="1.5"/>
  <line x1="12" y1="40" x2="64" y2="68" stroke="#4A3EA8" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="116" y1="40" x2="64" y2="68" stroke="#4A3EA8" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Subtle top highlight -->
  <polygon points="64,16 108,41 64,64 20,41" fill="white" fill-opacity="0.08"/>
</svg>
